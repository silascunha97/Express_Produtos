services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # nodemon + bind mount: o código do host é refletido ao vivo no container,
    # sem precisar rebuildar a imagem a cada alteração
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Dentro da rede do Docker Compose o Postgres é acessado pelo nome do serviço, não por "localhost"
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
